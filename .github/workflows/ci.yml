name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Format check
        run: cargo fmt --check
      - name: Tests
        run: cargo test
      - name: Docs trust links guard
        run: ./scripts/check-doc-links.sh
      - name: Build release binary
        run: cargo build --release
